<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6namdang CMS</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --subtle: #888;
            --accent: #000;
            --border: #f0f0f0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .hidden { display: none !important; }

        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .nav-group { display: flex; gap: 15px; align-items: center; }

        select, input {
            border: none;
            background: none;
            font-family: inherit;
            font-size: 13px;
            color: var(--text);
            outline: none;
        }

        select { cursor: pointer; color: var(--subtle); font-weight: 500; }
        select:hover { color: var(--accent); }

        input[type="text"] {
            border-bottom: 1px solid var(--border);
            padding: 2px 0;
            width: 140px;
        }

        button {
            background: none;
            border: none;
            padding: 5px;
            font-size: 13px;
            cursor: pointer;
            color: var(--subtle);
        }

        button:hover { color: var(--accent); }
        .save-btn { color: #2ecc71 !important; font-weight: 600; }
        .delete-btn { color: #e74c3c !important; }

        main {
            flex: 1;
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        #content {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            outline: none;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text);
        }

        #login-section {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .status-msg { position: fixed; bottom: 20px; left: 30px; font-size: 11px; color: var(--subtle); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="login-section">
        <input type="password" id="pat-input" placeholder="Access Token" style="text-align: center; width: 250px; font-size: 18px;">
    </div>

    <header id="cms-header" class="hidden">
        <div class="nav-group">
            <select id="folder-select">
                <option value="posts">/posts</option>
                <option value="projects">/projects</option>
            </select>
            <select id="posts-select">
                <option value="">Load file...</option>
            </select>
        </div>

        <div class="nav-group">
            <input type="text" id="new-filename" placeholder="filename.md">
            <button id="create-btn">New</button>
            <span style="color: var(--border)">|</span>
            <button id="save" class="save-btn">Save</button>
            <button id="delete-btn" class="delete-btn">Delete</button>
            <button id="logout-btn">Exit</button>
        </div>
    </header>

    <main id="cms-main" class="hidden">
        <textarea id="content" spellcheck="false" placeholder="..."></textarea>
    </main>

    <div id="status" class="status-msg"></div>

<script>
    const owner = '6namdang';
    const repo = '6namdang';

    const loginSection = document.getElementById('login-section');
    const cmsHeader = document.getElementById('cms-header');
    const cmsMain = document.getElementById('cms-main');
    const patInput = document.getElementById('pat-input');
    const folderSelect = document.getElementById('folder-select');
    const postsSelect = document.getElementById('posts-select');
    const contentArea = document.getElementById('content');
    const newFilenameInput = document.getElementById('new-filename');
    const statusText = document.getElementById('status');

    function notify(msg) {
        statusText.textContent = msg;
        setTimeout(() => { statusText.textContent = ''; }, 3000);
    }

    const getToken = () => sessionStorage.getItem('gh_pat');

    async function listFiles() {
        const token = getToken();
        const folder = folderSelect.value;
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${folder}`, {
                headers: { Authorization: `token ${token}` }
            });
            const data = await res.json();
            postsSelect.innerHTML = '<option value="">Load file...</option>'; 
            if(Array.isArray(data)) {
                data.forEach(file => {
                    if(file.type === 'file') {
                        const option = document.createElement('option');
                        option.value = file.path;
                        option.textContent = file.name;
                        postsSelect.appendChild(option);
                    }
                });
            }
            loginSection.classList.add('hidden');
            cmsHeader.classList.remove('hidden');
            cmsMain.classList.remove('hidden');
        } catch (err) { sessionStorage.clear(); location.reload(); }
    }

    function getFrontmatter(filename, folder) {
        const title = filename.replace('.md', '').replace(/-/g, ' ');
        const date = new Date().toISOString().split('T')[0];
        return `---
title: "${title}"
date: ${date}
readTime: 2 min
author: 6namdang
tags:
  - ${folder === 'posts' ? 'blog' : 'project'}
---

`;
    }

    folderSelect.onchange = listFiles;

    patInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            sessionStorage.setItem('gh_pat', patInput.value.trim());
            listFiles();
        }
    };

    // CREATE NEW
    document.getElementById('create-btn').onclick = () => {
        let name = newFilenameInput.value.trim();
        const folder = folderSelect.value;
        if (!name) return notify('Enter filename');
        if (!name.endsWith('.md')) name += '.md';
        
        window.currentPath = `${folder}/${name}`;
        window.currentSha = null;
        
        contentArea.value = getFrontmatter(name, folder);
        contentArea.focus();
        notify(`Created draft in /${folder}`);
    };

    // LOAD FILE
    document.getElementById('posts-select').onchange = async function() {
        const token = getToken();
        const path = this.value;
        if (!path) return;
        notify('Reading...');
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { Authorization: `token ${token}` }
            });
            const data = await res.json();
            contentArea.value = decodeURIComponent(escape(atob(data.content)));
            window.currentSha = data.sha;
            window.currentPath = path;
            notify('Opened');
        } catch (err) { notify('Error loading'); }
    };

    // SAVE Changes
    document.getElementById('save').onclick = async function() {
        const token = getToken();
        if (!window.currentPath) return notify('Nothing to save');
        
        notify('Syncing...');
        try {
            const content = contentArea.value;
            const body = {
                message: `cms write: ${window.currentPath}`,
                content: btoa(unescape(encodeURIComponent(content)))
            };
            if (window.currentSha) body.sha = window.currentSha;

            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${window.currentPath}`, {
                method: 'PUT',
                headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!res.ok) throw new Error();
            const data = await res.json();
            window.currentSha = data.content.sha;
            notify('Saved to GitHub');
            listFiles(); 
        } catch (err) { notify('Save failed'); }
    };

    // DELETE File
    document.getElementById('delete-btn').onclick = async function() {
        if (!window.currentPath || !window.currentSha) return;
        if (!confirm('Delete permanently?')) return;

        const token = getToken();
        try {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${window.currentPath}`, {
                method: 'DELETE',
                headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `cms delete: ${window.currentPath}`,
                    sha: window.currentSha
                })
            });
            contentArea.value = '';
            window.currentPath = null;
            notify('Deleted');
            listFiles();
        } catch (err) { notify('Delete failed'); }
    };

    document.getElementById('logout-btn').onclick = () => { sessionStorage.clear(); location.reload(); };

    if (getToken()) listFiles();
</script>
</body>
</html>
